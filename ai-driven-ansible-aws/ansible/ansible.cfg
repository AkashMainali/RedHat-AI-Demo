[defaults]
inventory            = ./inventory.ini
roles_path           = ./roles
host_key_checking    = True
retry_files_enabled  = False
stdout_callback      = yaml
timeout              = 60
forks                = 10
interpreter_python   = auto_silent
# Do NOT enable no_log globally, but every task that touches a secret sets
# no_log: true individually so secrets never appear in output or logs.

[ssh_connection]
# accept-new = trust-on-first-use: records the freshly provisioned host key on
# first connect, then verifies it on subsequent connects. Avoids both blind
# StrictHostKeyChecking=no and first-run failures.
ssh_args     = -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=./.known_hosts -o ServerAliveInterval=30 -o ControlMaster=auto -o ControlPersist=120s
pipelining   = True
